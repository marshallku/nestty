[plugin]
name = "git"
title = "Git Workspaces"
version = "0.2.0"
description = "Lightweight git workspace + worktree plugin. Reads workspaces from ~/.config/nestty/workspaces.toml. Provides git.list_workspaces / list_worktrees / worktree_add / worktree_remove / current_branch / status (every call is an argv-vector shell-out to `git`, no shell strings). Emits git.worktree_created / git.worktree_removed / git.branch_created / git.branch_deleted / git.checkout via a per-workspace polling watcher on .git/HEAD, .git/refs/heads/, .git/worktrees/."

[[services]]
name = "main"
exec = "nestty-plugin-git"
# onStartup: the polling watcher must be alive whenever nestty runs
# so branch/checkout/worktree changes between action calls still
# emit. Cheap — 2s default poll, ~few file reads per workspace.
# Tunable via NESTTY_GIT_POLL_MS.
activation = "onStartup"
restart = "on-crash"
provides = [
    "git.list_workspaces",
    "git.list_worktrees",
    "git.worktree_add",
    "git.worktree_remove",
    "git.current_branch",
    "git.status",
]
subscribes = []
# Optional env:
#   NESTTY_GIT_WORKSPACES_FILE — override the default
#                              ~/.config/nestty/workspaces.toml location.
#   NESTTY_GIT_POLL_MS         — watcher poll interval in ms
#                              (default 2000, min clamped to 250).
